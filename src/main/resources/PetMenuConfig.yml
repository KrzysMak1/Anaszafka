# ========= PetMenuConfig.yml =========
# Configuration for the Pet Preview Menu / Konfiguracja dla Menu Podglądu Petów
# Updated: 2025-10-09 - Full pagination support with 29 pets
# =====================================

# GUI title (supports color codes with & and hex &#RRGGBB) / Tytuł GUI (obsługuje kody kolorów z & oraz hex &#RRGGBB)
gui:
  title: "&8Lista petów"
  size: 54 # Must be 54 for pagination / Musi być 54 dla paginacji

# Pagination settings / Ustawienia paginacji
pagination:
  enabled: true
  pets_per_page: 28 # 28 slots per page (4 rows of 7) / 28 slotów na stronę (4 rzędy po 7)
  # Pet slots: 10-16, 19-25, 28-34, 37-43
  pet_slots:
    - 10
    - 11
    - 12
    - 13
    - 14
    - 15
    - 16
    - 19
    - 20
    - 21
    - 22
    - 23
    - 24
    - 25
    - 28
    - 29
    - 30
    - 31
    - 32
    - 33
    - 34
    - 37
    - 38
    - 39
    - 40
    - 41
    - 42
    - 43

# All available pets (alphabetically by default) / Wszystkie dostępne pety (domyślnie alfabetycznie)
# Total: 29 pets (requires 2 pages)
# You can specify custom slots for each pet or leave empty for automatic alphabetical placement
# Format: pet_name: slot_number (optional)
available_pets:
  aniolek: # Auto slot (alphabetically)
  balwanek: # Auto slot
  biznesmenik: # Auto slot
  bobas: # Auto slot
  cukiereczek: # Auto slot
  cyber-obronca: # Auto slot
  discordzik: # Auto slot
  drakula: # Auto slot
  duszek: # Auto slot
  elfik: # Auto slot
  enderman: # Auto slot
  eustachy: # Auto slot
  glodomorek: # Auto slot
  golemik: # Auto slot
  leniuszek: # Auto slot
  nietoperek: # Auto slot
  paczus: # Auto slot
  pajak: # Auto slot
  pancernik: # Auto slot
  pedziwiatr: # Auto slot
  pierniczek: # Auto slot
  pisklak: # Auto slot
  pudzianek: # Auto slot
  reniferek: # Auto slot
  rozdymek: # Auto slot
  skalniaczek: # Auto slot
  sowa: # Auto slot
  telekrolik: # Auto slot
  zajaczek: # Auto slot
  
# Example of custom slot assignment (uncomment to use):
# available_pets:
#   aniolek: 10
#   balwanek: 11
#   biznesmenik: 12
#   # etc...

# Pet visibility in preview menu / Widoczność petów w menu podglądu
preview:
  # Whether to show all pets, even if they're disabled in the plugin / Czy pokazywać wszystkie pety, nawet jeśli są wyłączone w wtyczce
  show_disabled_pets: true
  
  # Configuration for disabled/unavailable pets / Konfiguracja dla wyłączonych/niedostępnych petów
  disabled_pet_item:
    enabled: true # Whether to show a special item for disabled pets / Czy pokazywać specjalny przedmiot dla wyłączonych petów
    material: BARRIER # Material for disabled pet item / Materiał dla przedmiotu wyłączonego peta
    name: "&cPet niedostępny: {pet}" # {pet} will be replaced with pet name / {pet} zostanie zastąpione nazwą peta
    lore:
      - "&7"
      - "&cTen pet jest obecnie wyłączony"
      - "&7lub niedostępny na serwerze."
      - "&7"
      - "&7Skontaktuj się z administracją"
      - "&7aby uzyskać więcej informacji."
    glow: false
    model_data: 0
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
      - HIDE_UNBREAKABLE

# Items configuration / Konfiguracja przedmiotów
items:
  # Previous page button / Przycisk poprzedniej strony
  previous_page:
    slot: 48
    material: LIGHT_BLUE_DYE
    name: "&bPoprzednia strona"
    lore: []
    glow: false
    model_data: 0
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
      - HIDE_UNBREAKABLE
      - HIDE_POTION_EFFECTS
  
  # Return button (back to main menu) / Przycisk powrotu (powrót do głównego menu)
  return:
    slot: 49
    material: ARROW
    name: "&cPowrót"
    lore: []
    glow: false
    model_data: 0
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
      - HIDE_UNBREAKABLE
      - HIDE_POTION_EFFECTS
  
  # Next page button / Przycisk następnej strony
  next_page:
    slot: 50
    material: LIME_DYE
    name: "&aNastępna strona"
    lore: []
    glow: false
    model_data: 0
    flags:
      - HIDE_ATTRIBUTES
      - HIDE_ENCHANTS
      - HIDE_UNBREAKABLE
      - HIDE_POTION_EFFECTS

# Decorative blocks / Bloki dekoracyjne
decorations:
  enabled: false
  items:
    # Border decoration / Dekoracja obramowania
    border:
      # Top and bottom rows / Górny i dolny rząd
      slots: [0, 1, 2, 3, 4, 5, 6, 7, 8, 45, 46, 47, 51, 52, 53]
      material: BLACK_STAINED_GLASS_PANE
      name: " "
      lore: []
      glow: false
      model_data: 0
      flags:
        - HIDE_ATTRIBUTES
        - HIDE_ENCHANTS
    
    # Side borders / Boczne obramowania
    sides:
      slots: [9, 17, 18, 26, 27, 35, 36, 44]
      material: BLACK_STAINED_GLASS_PANE
      name: " "
      lore: []
      glow: false
      model_data: 0
      flags:
        - HIDE_ATTRIBUTES
        - HIDE_ENCHANTS
