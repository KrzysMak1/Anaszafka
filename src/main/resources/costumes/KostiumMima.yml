# Efekty kostiumu
effects:
  # Lustro bólu - odbija obrażenia
  pain_mirror:
    enabled: true
    activation_shifts: 3  # Ilość shiftów do aktywacji
    shift_timeout: 500  # Timeout między shiftami w ms (0.5s)
    duration: 200  # Czas trwania w tickach (10 sekund)
    damage_reduction: 0.95  # 95% redukcji obrażeń (prawie żadne obrażenia)
    particle_interval: 30  # Co ile ticków pokazywać cząsteczki (1.5s = 30 ticków)
    particle_type: REDSTONE  # Dust cząsteczki (kolorowalne)
    particle_color: "85,0,127"  # Ciemnofioletowy kolor (RGB dla &5)
    particle_radius: 0.75  # Promień okręgu cząsteczek (średnica ~1.5 bloku)
    particle_height_multiplier: 0.5  # Wysokość cząsteczek (połowa gracza)
  
  # Dodatkowe obrażenia
  extra_damage:
    enabled: true
    multiplier: 1.11  # +11% obrażeń
  
  # Dodatkowe serca
  extra_hearts:
    enabled: true
    hearts: 4  # +4 serca (8 HP)
  
  # Dźwięki
  sounds:
    equip: ITEM_ARMOR_EQUIP_LEATHER
    equip_volume: 1.0
    equip_pitch: 1.0
    mirror_activate: BLOCK_BEACON_ACTIVATE
    mirror_activate_volume: 1.0
    mirror_activate_pitch: 1.5

# Przedłużanie kostiumu
extension:
  enabled: true
  cost_per_day: 5000  # Koszt w walucie serwerowej za 1 dzień przedłużenia
